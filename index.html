<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="theme-color" content="#06C755">
<link rel="manifest" href="/manifest.json">
<title>Chat</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --green: #06C755; --green-dark: #05a847; }
* { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
html,body { height:100%;height:100dvh;overflow:hidden;position:fixed;width:100%;touch-action:manipulation; }
body { font-family:'Noto Sans Thai',sans-serif;background:#c8d6e0;display:flex;justify-content:center;align-items:center;background-image:radial-gradient(ellipse at 20% 50%,rgba(6,199,85,0.12) 0%,transparent 60%); }

/* LOGIN */
#login { background:white;border-radius:20px;padding:40px 28px 28px;width:min(360px,92vw);text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.18);animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.login-icon { width:80px;height:80px;background:var(--green);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(6,199,85,0.4);font-size:38px; }
#login h2{font-size:22px;font-weight:700;color:#111;margin-bottom:6px;}
#login p{font-size:13px;color:#999;margin-bottom:4px;}
.ver{font-size:10px;color:#ccc;margin-bottom:10px;}
.selling-points{display:flex;flex-direction:column;gap:5px;margin-top:14px;background:#f8fffe;border-radius:12px;padding:10px 12px;border:1px solid #e0f5ea;}
.sp{font-size:12px;color:#555;text-align:left;}

/* VOICE CALL */
#callbtn { width:34px;height:34px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center; }
#callbtn:active{background:#f0f0f0;}
#callbtn.incall{background:#e74c3c;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}50%{box-shadow:0 0 0 8px rgba(231,76,60,0)}}
.call-banner{background:#e74c3c;padding:8px 14px;font-size:12px;color:white;display:none;align-items:center;gap:8px;flex-shrink:0;}
.call-banner.show{display:flex;}
.call-banner span{flex:1;}
#remoteAudio{display:none;}
.field-label{font-size:12px;color:#888;text-align:left;margin-bottom:5px;padding-left:2px;}
.field-wrap{margin-bottom:12px;}
#login input{width:100%;padding:13px 16px;border:2px solid #eee;border-radius:12px;font-size:15px;font-family:'Noto Sans Thai',sans-serif;outline:none;transition:border-color 0.2s;background:#fafafa;color:#111;}
#login input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(6,199,85,0.12);background:white;}
.room-hint{font-size:11px;color:#bbb;text-align:left;padding-left:4px;margin-top:4px;}
#name-error{font-size:12px;color:#e74c3c;min-height:16px;text-align:left;padding-left:4px;margin-bottom:8px;}
#login button{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans Thai',sans-serif;cursor:pointer;transition:background 0.2s,transform 0.1s;box-shadow:0 4px 16px rgba(6,199,85,0.35);}
#login button:hover{background:var(--green-dark);}
#login button:active{transform:scale(0.97);}

/* CHAT */
#chat { display:none;flex-direction:row;width:100vw;height:100dvh;max-width:680px;max-height:820px;border-radius:clamp(0px,2vw,20px);overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.2);animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@media(max-width:600px){ body{align-items:stretch;justify-content:stretch;} #chat{max-width:100vw!important;max-height:100dvh!important;height:100dvh!important;border-radius:0!important;} #login{width:90vw;} }

/* SIDEBAR */
.sidebar { width:clamp(60px,22vw,130px);background:#1e2a30;display:flex;flex-direction:column;flex-shrink:0; }
.sidebar-header { padding:14px 10px 10px;background:#161f24;border-bottom:1px solid rgba(255,255,255,0.06); }
.sidebar-header h4 { color:rgba(255,255,255,0.5);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px; }
.sidebar-header span { color:white;font-size:13px;font-weight:600; }
#userlist { flex:1;overflow-y:auto;padding:8px 0; }
#userlist::-webkit-scrollbar{width:3px;}
.user-item { display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;border-radius:8px;margin:1px 4px;transition:background 0.15s; }
.user-item:hover { background:rgba(255,255,255,0.08); }
.user-item.dm-active { background:rgba(6,199,85,0.2); }
.u-dot { width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(6,199,85,0.6); }
.u-name { color:rgba(255,255,255,0.85);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.u-me { color:var(--green)!important;font-weight:600; }
.u-badge { background:#e74c3c;color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px;margin-left:auto;flex-shrink:0; }

/* MAIN */
.main { flex:1;display:flex;flex-direction:column;min-width:0; }
.header { background:var(--green);padding:0 14px;height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0; }
.h-back { background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0; }
.h-back.show { display:flex; }
.h-avatar { width:36px;height:36px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0; }
.h-info { flex:1;min-width:0; }
.h-title { color:white;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.h-sub { color:rgba(255,255,255,0.8);font-size:11px;display:flex;align-items:center;gap:4px; }
.dot { width:6px;height:6px;background:white;border-radius:50%;animation:blink 2s infinite;flex-shrink:0; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#sharebtn { background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 10px;border-radius:16px;font-size:12px;font-family:'Noto Sans Thai',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0; }

/* MESSAGES */
#msgs { flex:1;overflow-y:auto;padding:12px 10px;background:#dfe8ed;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain; }
#msgs::-webkit-scrollbar{width:3px;}
.sys { text-align:center;font-size:11px;color:#6b7c85;background:rgba(255,255,255,0.6);padding:3px 12px;border-radius:20px;align-self:center; }
.row { display:flex;align-items:flex-end;gap:6px;animation:fadeUp 0.2s ease; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.row.me { flex-direction:row-reverse; }
.avatar { width:30px;height:30px;border-radius:50%;background:var(--green);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.15); }
.col { max-width:72%;display:flex;flex-direction:column; }
.row.me .col { align-items:flex-end; }
.sender { font-size:10px;color:#7a8f9a;margin-bottom:2px;padding-left:2px; }
.bubble { padding:8px 12px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word; }
.bubble.other { background:white;color:#111;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.1); }
.bubble.me { background:var(--green);color:white;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(6,199,85,0.3); }
.bubble.sticker { background:none!important;box-shadow:none!important;font-size:48px;padding:2px; }
.bubble.dm-bubble.other { background:#f0e6ff;border-bottom-left-radius:4px; }
.bubble.dm-bubble.me { background:#9b59b6;border-bottom-right-radius:4px; }
.time { font-size:10px;color:#9aabb4;margin-top:2px;padding:0 2px; }
.row.me .time { text-align:right; }

/* DM banner */
.dm-banner { background:#f0e6ff;border-bottom:1px solid #d9b8ff;padding:8px 14px;font-size:12px;color:#7d3c98;display:none;align-items:center;gap:8px;flex-shrink:0; }
.dm-banner.show { display:flex; }
.dm-banner span { flex:1; }

/* INPUT BAR */
.bar { padding:8px 10px;background:white;border-top:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;padding-bottom:max(8px,env(safe-area-inset-bottom)); }
#msg { flex:1;padding:9px 14px;border:1.5px solid #e5e5e5;border-radius:22px;font-size:14px;font-family:'Noto Sans Thai',sans-serif;outline:none;background:#f7f7f7;color:#111;transition:border-color 0.2s; }
#msg:focus { border-color:var(--green);background:white; }
#msg.dm-mode { border-color:#9b59b6; }
#msg.dm-mode:focus { border-color:#7d3c98;box-shadow:0 0 0 3px rgba(155,89,182,0.12); }
#emojibtn { width:34px;height:34px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center; }
#sendbtn { width:38px;height:38px;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(6,199,85,0.4);flex-shrink:0;transition:background 0.2s; }
#sendbtn.dm-mode { background:#9b59b6;box-shadow:0 3px 10px rgba(155,89,182,0.4); }
#sendbtn:active { transform:scale(0.9); }
#sendbtn svg { width:16px;height:16px;fill:white;margin-left:2px; }

#emojipanel { display:none;position:absolute;bottom:60px;left:8px;background:white;border-radius:14px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,0.15);width:min(300px,90vw);z-index:100;flex-direction:column;gap:6px; }
#emojipanel.show { display:flex; }
.ep-tabs { display:flex;gap:4px; }
.ep-tab { flex:1;padding:5px;border:none;background:none;border-radius:8px;font-size:12px;cursor:pointer;color:#888;font-family:'Noto Sans Thai',sans-serif; }
.ep-tab.active { background:#f0f0f0;color:#111;font-weight:600; }
.ep-grid { display:flex;flex-wrap:wrap;gap:2px;max-height:160px;overflow-y:auto; }
.ep-emoji { font-size:22px;cursor:pointer;padding:3px;border-radius:6px;line-height:1; }
#imgbtn { width:34px;height:34px;background:none;border:none;font-size:20px;cursor:pointer;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center; }
#imgbtn:active{background:#f0f0f0;}
.bubble img { max-width:200px;max-height:200px;border-radius:10px;display:block;cursor:pointer; }
.uploading { font-size:12px;color:#888;font-style:italic; }
.typing-indicator { display:none;align-items:center;gap:6px;padding:4px 10px;animation:fadeUp 0.2s ease; }
.typing-indicator.show { display:flex; }
.typing-text { font-size:11px;color:#7a8f9a;font-style:italic; }
.typing-dots span { display:inline-block;width:5px;height:5px;background:#9aabb4;border-radius:50%;margin:0 1px;animation:tdot 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
</style>
</head>
<body>

<div id="login">
  <div class="login-icon">💬</div>
  <h2>เข้าสู่ห้องแชท</h2>
  <p>ตั้งชื่อและเลือกห้องที่ต้องการ</p>
  <div class="ver">v2.8</div>
  <div class="field-wrap">
    <div class="field-label">ชื่อของคุณ</div>
    <input id="name" type="text" placeholder="ชื่อของคุณ..." maxlength="20" autocomplete="off">
  </div>
  <div class="field-wrap">
    <div class="field-label">ห้องแชท (ไม่ระบุ = Default)</div>
    <input id="room" type="text" placeholder="ไม่ระบุ" maxlength="30" autocomplete="off">
    <div class="room-hint">พิมพ์ชื่อห้องที่มีอยู่เพื่อเข้าร่วม หรือพิมพ์ชื่อใหม่เพื่อสร้างห้อง</div>
  </div>
  <div id="name-error"></div>
  <button onclick="join()">เข้าร่วม</button>
  <div class="selling-points">
    <div class="sp">💬 แชทกลุ่ม • 👤 DM • 🖼️ รูปภาพ • 😊 Emoji • 📞 Voice Call</div>
  </div>
</div>

<div id="chat">
  <div class="sidebar">
    <div class="sidebar-header">
      <h4>Online</h4>
      <span id="user-count">0 คน</span>
    </div>
    <div id="userlist"></div>
  </div>
  <div class="main">
    <div class="header">
      <button class="h-back" id="backbtn" onclick="backToGroup()">←</button>
      <div class="h-avatar" id="h-avatar">👥</div>
      <div class="h-info">
        <div class="h-title" id="room-title">ห้อง Default</div>
        <div class="h-sub"><span class="dot"></span> <span id="h-sub-text">Online</span></div>
      </div>
      <button id="callbtn" style="display:none" onclick="toggleCall()" title="Voice Call">📞</button>
      <button id="sharebtn" style="display:none" onclick="shareRoom()">🔗 แชร์</button>
    </div>
    <div class="call-banner" id="call-banner">
      <span id="call-banner-text">📞 กำลังโทร...</span>
      <button onclick="endCall()" style="background:none;border:none;color:white;cursor:pointer;font-size:12px;font-weight:700;">วางสาย ✕</button>
    </div>
    <audio id="remoteAudio" autoplay></audio>
    <div class="dm-banner" id="dm-banner">
      <span id="dm-banner-text">💬 DM กับ ...</span>
      <button onclick="backToGroup()" style="background:none;border:none;color:#7d3c98;cursor:pointer;font-size:12px;">✕ ปิด</button>
    </div>
    <div id="msgs"></div>
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <div class="typing-text" id="typing-text">กำลังพิมพ์...</div>
    </div>
    <div class="bar">
      <div id="emojipanel">
        <div class="ep-tabs">
          <button class="ep-tab active" onclick="switchTab('emoji')">😊 Emoji</button>
          <button class="ep-tab" onclick="switchTab('sticker')">🎭 Sticker</button>
        </div>
        <div class="ep-grid" id="ep-grid"></div>
      </div>
      <button id="emojibtn" onclick="toggleEmoji()">😊</button>
      <button id="imgbtn" onclick="document.getElementById('imgfile').click()">🖼️</button>
      <input id="imgfile" type="file" accept="image/*" style="display:none" onchange="uploadImg(this)">
      <input id="msg" type="text" placeholder="พิมพ์ข้อความ..." autocomplete="off">
      <button id="sendbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var socket, me, myId, curTab='emoji';
var dmTarget = null;
var dmUnread = {};
var dmHistory = {};
var groupHistory = [];
var mode = 'group';
var typingTimer = null;
var typingUsers = {};

// เสียงแจ้งเตือน (สร้างจาก Web Audio API ไม่ต้องโหลดไฟล์)
function playNotify(){
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.3);
  } catch(e){}
}

var EMOJIS=['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩','😘','😚','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🫡','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','😮','😯','😲','😳','🥺','🥹','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','☠️','💩','🤡','👻','👽','👾','🤖','😺','😸','🎃','👍','👎','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','☝️','✋','🤚','🖐️','👋','🤝','🙌','👏','🫶','🙏','💪','🦾','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❤️‍🔥','💕','💞','💓','💗','💖','💘','💝','💟','🔥','💥','⭐','🌟','✨','🎉','🎊','🎈','🏆','🥇','🎯','🎮','🎲','🎭','🎨','🎬','🎤','🎧','🎵','🎶','🚀','✈️','🚗','🍕','🍔','🍟','🌮','🍣','🍜','🍰','🎂','🧁','🍫','🍬','🍭','🍺','🥂','🧋','💻','📱','💯'];
var STICKERS=['😂','🥹','😍','🤩','😎','🥳','😭','😱','🤯','😤','🥺','😴','🤪','😇','🤬','👻','💩','🤡','👾','🎃','🫶','💪','👑','🦁','🐯','🦊','🐸','🐧','🦄','🐲'];

function switchTab(tab){ curTab=tab; document.querySelectorAll('.ep-tab').forEach(function(t,i){ t.classList.toggle('active',(i===0&&tab==='emoji')||(i===1&&tab==='sticker')); }); renderGrid(); }
function renderGrid(){ var grid=document.getElementById('ep-grid'); grid.innerHTML=''; (curTab==='emoji'?EMOJIS:STICKERS).forEach(function(e){ var s=document.createElement('span'); s.className=curTab==='emoji'?'ep-emoji':'ep-sticker'; s.textContent=e; s.onclick=function(){ curTab==='emoji'?insertEmoji(e):sendSticker(e); }; grid.appendChild(s); }); }
function toggleEmoji(){ var p=document.getElementById('emojipanel'); if(p.classList.contains('show')){p.classList.remove('show');return;} renderGrid(); p.classList.add('show'); }
function insertEmoji(e){ var inp=document.getElementById('msg'); inp.value+=e; inp.focus(); document.getElementById('emojipanel').classList.remove('show'); }
function sendSticker(e){ if(!socket) return; if(mode==='dm'&&dmTarget){ socket.emit('dm',{toId:dmTarget.id,text:e,sticker:true}); }else{ socket.emit('msg',{user:me,text:e,sticker:true}); } document.getElementById('emojipanel').classList.remove('show'); }
document.addEventListener('click',function(e){ if(!e.target.closest('#emojibtn')&&!e.target.closest('#emojipanel')) document.getElementById('emojipanel').classList.remove('show'); });

var COLORS=['#e74c3c','#e67e22','#3498db','#9b59b6','#1abc9c','#e91e63','#ff5722','#607d8b'];
function nameColor(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function timeNow(){return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}

// โหลด history จาก sessionStorage
var urlRoom=new URLSearchParams(window.location.search).get('room')||'';
if(urlRoom) document.getElementById('room').value=urlRoom;

function saveHistory(){ 
  try { 
    sessionStorage.setItem('chat_group', JSON.stringify(groupHistory.slice(-200)));
    sessionStorage.setItem('chat_dm', JSON.stringify(dmHistory));
  } catch(e){} 
}
function loadHistory(){
  try {
    var g=sessionStorage.getItem('chat_group');
    var d=sessionStorage.getItem('chat_dm');
    if(g) groupHistory=JSON.parse(g);
    if(d) dmHistory=JSON.parse(d);
  } catch(e){}
}

// auto-rejoin ถ้า refresh
(function(){
  var savedName=sessionStorage.getItem('chat_name');
  var savedRoom=sessionStorage.getItem('chat_room');
  if(savedName){
    loadHistory();
    document.getElementById('name').value=savedName;
    document.getElementById('room').value=savedRoom||'';
    join();
  }
})();

function join(){
  me=document.getElementById('name').value.trim();
  var room=document.getElementById('room').value.trim()||'default';
  document.getElementById('name-error').textContent='';
  if(!me) return;
  if(socket) socket.disconnect();
  socket=io();
  socket.on('connect',function(){ myId=socket.id; socket.emit('join',{name:me,room:room}); });
  socket.on('nameTaken',function(){ socket.disconnect(); socket=null; document.getElementById('name').style.borderColor='#e74c3c'; document.getElementById('name-error').textContent='⚠️ ชื่อนี้มีคนใช้อยู่ในห้องนี้แล้ว'; document.getElementById('name').focus(); });
  socket.on('joined',function(data){
    myId=data.sid;
    sessionStorage.setItem('chat_name', me);
    sessionStorage.setItem('chat_room', data.room);
    var roomName=data.room==='default'?'Default':data.room;
    var displayName='ห้อง '+roomName;
    document.getElementById('room-title').textContent=displayName;
    document.getElementById('room-title').dataset.group=displayName;
    document.getElementById('login').style.display='none';
    document.getElementById('chat').style.display='flex';
    // แสดง history เก่า
    groupHistory.forEach(function(d){ addMsgToView(d,false); });
    document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
    document.getElementById('msg').focus();
  });
  socket.on('msg',function(d){
    groupHistory.push(d);
    saveHistory();
    if(mode==='group') addMsgToView(d,false);
    if(d.user!=='System' && d.sid!==myId) playNotify();
  });
  socket.on('dm',function(d){
    var otherId=d.fromId===myId?d.toId:d.fromId;
    if(!dmHistory[otherId]) dmHistory[otherId]=[];
    dmHistory[otherId].push(d);
    saveHistory();
    if(mode==='dm'&&dmTarget&&dmTarget.id===otherId){
      addDmToView(d);
      if(d.fromId!==myId) playNotify();
    } else if(d.fromId!==myId){
      dmUnread[otherId]=(dmUnread[otherId]||0)+1;
      updateBadges();
      playNotify();
    }
  });
  socket.on('typing',function(d){
    if(d.typing){
      typingUsers[d.name]=true;
    } else {
      delete typingUsers[d.name];
    }
    updateTyping();
  });
  socket.on('users',function(list){ 
    window._userList = list;
    updateUsers(list); 
  });
  socket.on('webrtc',function(d){ handleWebRTC(d); });
}

function updateUsers(list){
  var ul=document.getElementById('userlist'); ul.innerHTML='';
  document.getElementById('user-count').textContent=list.length+' คน';
  list.forEach(function(u){
    var div=document.createElement('div');
    div.className='user-item'+(dmTarget&&dmTarget.id===u.id?' dm-active':'');
    var isMe=u.id===myId;
    var badge=(!isMe&&dmUnread[u.id])?'<span class="u-badge">'+dmUnread[u.id]+'</span>':'';
    div.innerHTML='<div class="u-dot"></div><div class="u-name'+(isMe?' u-me':'')+'">'+u.name+(isMe?' (คุณ)':'')+'</div>'+badge;
    if(!isMe){ div.onclick=function(){ openDM(u); }; div.title='DM กับ '+u.name; }
    ul.appendChild(div);
  });
}

function updateTyping(){
  var names=Object.keys(typingUsers);
  var el=document.getElementById('typing-indicator');
  var txt=document.getElementById('typing-text');
  if(names.length>0){
    txt.textContent=names.join(', ')+' กำลังพิมพ์...';
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function sendTyping(isTyping){
  if(!socket) return;
  if(mode==='dm'&&dmTarget){
    socket.emit('typing',{toId:dmTarget.id,typing:isTyping});
  } else {
    socket.emit('typing',{typing:isTyping});
  }
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('msg').addEventListener('input',function(){
    sendTyping(true);
    clearTimeout(typingTimer);
    typingTimer=setTimeout(function(){ sendTyping(false); },1500);
  });
});

function updateUsersSidebar(){
  if(window._userList) updateUsers(window._userList);
}

function openDM(user){
  dmTarget=user;
  mode='dm';
  dmUnread[user.id]=0;
  // update UI
  document.getElementById('room-title').textContent='💬 '+user.name;
  document.getElementById('h-sub-text').textContent='Direct Message';
  document.getElementById('h-avatar').textContent='👤';
  document.getElementById('backbtn').classList.add('show');
  document.getElementById('sharebtn').style.display='none';
  showCallBtn(true);
  document.getElementById('dm-banner').classList.add('show');
  document.getElementById('dm-banner-text').textContent='💬 DM กับ '+user.name+' (คนอื่นไม่เห็น)';
  document.getElementById('msg').classList.add('dm-mode');
  document.getElementById('msg').placeholder='ส่งหา '+user.name+'...';
  document.getElementById('sendbtn').classList.add('dm-mode');
  // แสดง DM history
  var msgs=document.getElementById('msgs'); msgs.innerHTML='';
  var history=dmHistory[user.id]||[];
  history.forEach(function(d){ addDmToView(d); });
  msgs.scrollTop=msgs.scrollHeight;
  // update sidebar
  updateUsersSidebar();
}

function backToGroup(){
  dmTarget=null; mode='group';
  var displayName=document.getElementById('room-title').dataset.group||'ห้อง Default';
  document.getElementById('room-title').textContent=displayName;
  document.getElementById('h-sub-text').textContent='Online';
  document.getElementById('h-avatar').textContent='👥';
  document.getElementById('backbtn').classList.remove('show');
  document.getElementById('sharebtn').style.display='';
  showCallBtn(false);
  endCall();
  document.getElementById('dm-banner').classList.remove('show');
  document.getElementById('msg').classList.remove('dm-mode');
  document.getElementById('msg').placeholder='พิมพ์ข้อความ...';
  document.getElementById('sendbtn').classList.remove('dm-mode');
  // แสดง group history
  var msgs=document.getElementById('msgs'); msgs.innerHTML='';
  groupHistory.forEach(function(d){ addMsgToView(d,false); });
  msgs.scrollTop=msgs.scrollHeight;
  updateUsersSidebar();
}

function addMsgToView(d, isDm){
  var msgs=document.getElementById('msgs');
  if(d.user==='System'){
    var s=document.createElement('div');s.className='sys';s.textContent=d.text;msgs.appendChild(s);
  } else {
    var isMe = d.sid===myId || d.user===me;
    var row=document.createElement('div');row.className='row'+(isMe?' me':'');
    var av=document.createElement('div');av.className='avatar';av.textContent=d.user[0].toUpperCase();
    if(!isMe) av.style.background=nameColor(d.user);
    var col=document.createElement('div');col.className='col';
    if(!isMe){var sn=document.createElement('div');sn.className='sender';sn.textContent=d.user;col.appendChild(sn);}
    var bub=document.createElement('div');
    if(d.image){
      bub.className='bubble '+(isMe?'me':'other');
      var img=document.createElement('img');img.src=d.image;img.onclick=function(){window.open(d.image,'_blank');};
      bub.appendChild(img);
    } else {
      bub.className='bubble '+(isMe?'me':'other')+(d.sticker?' sticker':'');
      bub.textContent=d.text;
    }
    var tm=document.createElement('div');tm.className='time';tm.textContent=timeNow();
    col.appendChild(bub);col.appendChild(tm);
    if(isMe){row.appendChild(col);row.appendChild(av);}else{row.appendChild(av);row.appendChild(col);}
    msgs.appendChild(row);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function addDmToView(d){
  var msgs=document.getElementById('msgs');
  var isMe=d.fromId===myId;
  var row=document.createElement('div');row.className='row'+(isMe?' me':'');
  var av=document.createElement('div');av.className='avatar';
  av.textContent=(isMe?me:d.fromName)[0].toUpperCase();
  if(!isMe) av.style.background='#9b59b6';
  var col=document.createElement('div');col.className='col';
  if(!isMe){var sn=document.createElement('div');sn.className='sender';sn.textContent=d.fromName;col.appendChild(sn);}
  var bub=document.createElement('div');
  if(d.image){
    bub.className='bubble dm-bubble '+(isMe?'me':'other');
    var img=document.createElement('img');img.src=d.image;img.onclick=function(){window.open(d.image,'_blank');};
    bub.appendChild(img);
  } else {
    bub.className='bubble dm-bubble '+(isMe?'me':'other')+(d.sticker?' sticker':'');
    bub.textContent=d.text;
  }
  var tm=document.createElement('div');tm.className='time';tm.textContent=timeNow();
  col.appendChild(bub);col.appendChild(tm);
  if(isMe){row.appendChild(col);row.appendChild(av);}else{row.appendChild(av);row.appendChild(col);}
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function send(){
  var t=document.getElementById('msg').value.trim();
  if(!t||!socket) return;
  sendTyping(false);
  clearTimeout(typingTimer);

  // ลูกเต๋า
  if(t.toLowerCase().startsWith('/roll')){
    var parts=t.split(' ');
    var count=parseInt(parts[1])||1;
    count=Math.min(count,6); // สูงสุด 6 ลูก
    var results=[];
    for(var i=0;i<count;i++) results.push(Math.floor(Math.random()*6)+1);
    var txt = count===1
      ? '🎲 '+me+' ทอยได้ '+results[0]
      : '🎲 '+me+' ทอยได้ '+results.join(', ')+' (รวม '+results.reduce(function(a,b){return a+b;},0)+')';
    if(mode==='dm'&&dmTarget){
      socket.emit('dm',{toId:dmTarget.id,text:txt});
    } else {
      socket.emit('msg',{user:me,text:txt});
    }
    document.getElementById('msg').value='';
    document.getElementById('msg').focus();
    return;
  }
  if(mode==='dm'&&dmTarget){
    socket.emit('dm',{toId:dmTarget.id,text:t});
  } else {
    socket.emit('msg',{user:me,text:t});
  }
  document.getElementById('msg').value='';
  document.getElementById('msg').focus();
}

function uploadImg(input){
  var file=input.files[0]; if(!file||!socket) return;
  input.value='';
  uploadImgFile(file);
}

function uploadImgFile(file){
  var tmpId='tmp_'+Date.now();
  var msgs=document.getElementById('msgs');
  var tmp=document.createElement('div');tmp.className='sys uploading';tmp.id=tmpId;tmp.textContent='⏳ กำลังอัพโหลดรูป...';
  msgs.appendChild(tmp);msgs.scrollTop=msgs.scrollHeight;
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    var fd=new FormData();
    fd.append('image',b64);
    fetch('https://api.imgbb.com/1/upload?key=9c3cae51f07e4cf9afca704b6a7814b6',{method:'POST',body:fd})
    .then(function(r){return r.json();})
    .then(function(data){
      var el=document.getElementById(tmpId);if(el)el.remove();
      if(data.success){
        var url=data.data.url;
        if(mode==='dm'&&dmTarget){
          socket.emit('dm',{toId:dmTarget.id,text:'',image:url});
        } else {
          socket.emit('msg',{user:me,text:'',image:url});
        }
      }
    })
    .catch(function(){
      var el=document.getElementById(tmpId);if(el)el.textContent='❌ อัพโหลดไม่สำเร็จ';
      setTimeout(function(){var el=document.getElementById(tmpId);if(el)el.remove();},2000);
    });
  };
  reader.readAsDataURL(file);
}

// ── WebRTC Voice Call ──
var pc=null, localStream=null, callPeer=null;
var ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

function showCallBtn(show){ document.getElementById('callbtn').style.display=show?'':'none'; }

function toggleCall(){
  if(pc) endCall(); else startCall();
}

function startCall(){
  if(!dmTarget){ alert('กรุณาเปิด DM ก่อนโทรครับ'); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    localStream=stream;
    pc=new RTCPeerConnection(ICE);
    stream.getTracks().forEach(function(t){ pc.addTrack(t,stream); });
    pc.onicecandidate=function(e){ if(e.candidate) socket.emit('webrtc',{type:'candidate',to:dmTarget.id,candidate:e.candidate}); };
    pc.ontrack=function(e){ document.getElementById('remoteAudio').srcObject=e.streams[0]; };
    pc.createOffer().then(function(offer){
      return pc.setLocalDescription(offer);
    }).then(function(){
      socket.emit('webrtc',{type:'offer',to:dmTarget.id,sdp:pc.localDescription});
      setCallUI(true,'📞 กำลังโทรหา '+dmTarget.name+'...');
    });
  }).catch(function(err){ 
    var msgs=document.getElementById('msgs');
    var s=document.createElement('div');s.className='sys';
    s.textContent='🎤 กรุณาอนุญาตไมค์ในเบราว์เซอร์ก่อนครับ';
    msgs.appendChild(s);msgs.scrollTop=msgs.scrollHeight;
  });
}

function endCall(){
  if(pc){ pc.close(); pc=null; }
  if(localStream){ localStream.getTracks().forEach(function(t){ t.stop(); }); localStream=null; }
  if(callPeer&&socket) socket.emit('webrtc',{type:'end',to:callPeer});
  callPeer=null;
  setCallUI(false,'');
}

function setCallUI(active, text){
  var btn=document.getElementById('callbtn');
  var banner=document.getElementById('call-banner');
  btn.textContent=active?'📵':'📞';
  btn.classList.toggle('incall',active);
  banner.classList.toggle('show',active);
  document.getElementById('call-banner-text').textContent=text;
}

function handleWebRTC(data){
  if(data.type==='offer'){
    callPeer=data.from;
    // แจ้งเตือนรับสาย
    var accept=confirm('📞 '+data.fromName+' โทรหาคุณ รับสายไหม?');
    if(!accept){ socket.emit('webrtc',{type:'end',to:data.from}); return; }
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      localStream=stream;
      pc=new RTCPeerConnection(ICE);
      stream.getTracks().forEach(function(t){ pc.addTrack(t,stream); });
      pc.onicecandidate=function(e){ if(e.candidate) socket.emit('webrtc',{type:'candidate',to:data.from,candidate:e.candidate}); };
      pc.ontrack=function(e){ document.getElementById('remoteAudio').srcObject=e.streams[0]; };
      pc.setRemoteDescription(new RTCSessionDescription(data.sdp)).then(function(){
        return pc.createAnswer();
      }).then(function(answer){
        return pc.setLocalDescription(answer);
      }).then(function(){
        socket.emit('webrtc',{type:'answer',to:data.from,sdp:pc.localDescription});
        setCallUI(true,'📞 กำลังคุยกับ '+data.fromName);
      });
    });
  } else if(data.type==='answer'){
    if(pc) pc.setRemoteDescription(new RTCSessionDescription(data.sdp)).then(function(){
      setCallUI(true,'📞 กำลังคุยกับ '+(dmTarget?dmTarget.name:''));
    });
  } else if(data.type==='candidate'){
    if(pc) pc.addIceCandidate(new RTCIceCandidate(data.candidate));
  } else if(data.type==='end'){
    endCall();
    setCallUI(false,'');
    var msgs=document.getElementById('msgs');
    var s=document.createElement('div');s.className='sys';s.textContent='📵 วางสายแล้ว';msgs.appendChild(s);
  }
}

function shareRoom(){
  var room=document.getElementById('room-title').textContent.replace('ห้อง ','');
  var url=window.location.origin+window.location.pathname+'?room='+encodeURIComponent(room==='Default'?'default':room);
  navigator.clipboard.writeText(url).then(function(){
    var btn=document.getElementById('sharebtn');
    btn.textContent='✅ คัดลอกแล้ว!';
    setTimeout(function(){btn.textContent='🔗 แชร์';},2000);
  });
}

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter') return;
  var chat=document.getElementById('chat');
  if(chat.style.display==='none'||chat.style.display==='') join(); else send();
});

// paste รูปได้เลย
document.addEventListener('paste',function(e){
  if(!socket) return;
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items) return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      var file=items[i].getAsFile();
      if(file) uploadImgFile(file);
      break;
    }
  }
});

if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js'); }
