<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --green: #06C755; --green-dark: #05a847; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans Thai', sans-serif; background: #c8d6e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-image: radial-gradient(ellipse at 20% 50%, rgba(6,199,85,0.12) 0%, transparent 60%); }

#login { background: white; border-radius: 20px; padding: 44px 36px 36px; width: 360px; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.18); animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.login-icon { width:80px;height:80px;background:var(--green);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(6,199,85,0.4);font-size:38px; }
#login h2{font-size:22px;font-weight:700;color:#111;margin-bottom:6px;}
#login p{font-size:13px;color:#999;margin-bottom:24px;}
.field-label{font-size:12px;color:#888;text-align:left;margin-bottom:5px;padding-left:2px;}
.field-wrap{margin-bottom:14px;}
#login input { width:100%;padding:13px 18px;border:2px solid #eee;border-radius:12px;font-size:15px;font-family:'Noto Sans Thai',sans-serif;outline:none;transition:border-color 0.2s;background:#fafafa;color:#111; }
#login input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(6,199,85,0.12);background:white;}
.room-hint{font-size:11px;color:#bbb;text-align:left;padding-left:4px;margin-top:4px;}
#name-error{font-size:12px;color:#e74c3c;min-height:16px;text-align:left;padding-left:4px;margin-bottom:8px;}
#login button { width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans Thai',sans-serif;cursor:pointer;transition:background 0.2s,transform 0.1s;box-shadow:0 4px 16px rgba(6,199,85,0.35); }
#login button:hover{background:var(--green-dark);}
#login button:active{transform:scale(0.97);}

#chat { display:none;flex-direction:row;width:620px;height:700px;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.2);animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.sidebar { width:130px;background:#1e2a30;display:flex;flex-direction:column;flex-shrink:0; }
.sidebar-header { padding:16px 14px 12px;background:#161f24;border-bottom:1px solid rgba(255,255,255,0.06); }
.sidebar-header h4 { color:rgba(255,255,255,0.5);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px; }
.sidebar-header span { color:white;font-size:13px;font-weight:600; }
#userlist { flex:1;overflow-y:auto;padding:10px 0; }
#userlist::-webkit-scrollbar{width:3px;}
#userlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);}
.user-item { display:flex;align-items:center;gap:8px;padding:7px 14px; }
.u-dot { width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(6,199,85,0.6); }
.u-name { color:rgba(255,255,255,0.85);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.u-me { color:var(--green) !important;font-weight:600; }

.main { flex:1;display:flex;flex-direction:column;min-width:0; }
.header { background:var(--green);padding:0 18px;height:60px;display:flex;align-items:center;gap:12px;flex-shrink:0; }
.h-avatar { width:38px;height:38px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px; }
.h-info{}
.h-title{color:white;font-size:16px;font-weight:700;}
.h-sub{color:rgba(255,255,255,0.8);font-size:12px;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;background:white;border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

#msgs { flex:1;overflow-y:auto;padding:16px 14px;background:#dfe8ed;display:flex;flex-direction:column;gap:6px; }
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px;}
.sys { text-align:center;font-size:11.5px;color:#6b7c85;background:rgba(255,255,255,0.6);padding:4px 14px;border-radius:20px;align-self:center; }
.row{display:flex;align-items:flex-end;gap:7px;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.row.me{flex-direction:row-reverse;}
.avatar { width:34px;height:34px;border-radius:50%;background:var(--green);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.15); }
.col{max-width:68%;display:flex;flex-direction:column;}
.row.me .col{align-items:flex-end;}
.sender{font-size:11px;color:#7a8f9a;margin-bottom:3px;padding-left:2px;}
.bubble{padding:9px 14px;border-radius:18px;font-size:14.5px;line-height:1.55;word-break:break-word;}
.bubble.other{background:white;color:#111;border-bottom-left-radius:5px;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.bubble.me{background:var(--green);color:white;border-bottom-right-radius:5px;box-shadow:0 2px 8px rgba(6,199,85,0.3);}
.bubble.sticker{background:none!important;box-shadow:none!important;font-size:52px;padding:4px;}
.time{font-size:10.5px;color:#9aabb4;margin-top:3px;padding:0 3px;}
.row.me .time{text-align:right;}

.bar { height:64px;padding:0 12px;background:white;border-top:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative; }
#msg { flex:1;padding:10px 16px;border:1.5px solid #e5e5e5;border-radius:24px;font-size:14.5px;font-family:'Noto Sans Thai',sans-serif;outline:none;background:#f7f7f7;color:#111;transition:border-color 0.2s,background 0.2s; }
#msg:focus{border-color:var(--green);background:white;}
#emojibtn { width:36px;height:36px;background:none;border:none;font-size:22px;cursor:pointer;flex-shrink:0;border-radius:50%;transition:background 0.15s;display:flex;align-items:center;justify-content:center; }
#emojibtn:hover{background:#f0f0f0;}
#sendbtn { width:42px;height:42px;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(6,199,85,0.4);transition:background 0.2s,transform 0.1s;flex-shrink:0; }
#sendbtn:hover{background:var(--green-dark);}
#sendbtn:active{transform:scale(0.9);}
#sendbtn svg{width:18px;height:18px;fill:white;margin-left:2px;}
#emojipanel { display:none;position:absolute;bottom:70px;left:12px;background:white;border-radius:14px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,0.15);width:300px;z-index:100;flex-direction:column;gap:6px; }
#emojipanel.show{display:flex;}
.ep-tabs{display:flex;gap:4px;}
.ep-tab{flex:1;padding:5px;border:none;background:none;border-radius:8px;font-size:13px;cursor:pointer;color:#888;font-family:'Noto Sans Thai',sans-serif;}
.ep-tab.active{background:#f0f0f0;color:#111;font-weight:600;}
.ep-grid{display:flex;flex-wrap:wrap;gap:2px;max-height:180px;overflow-y:auto;}
.ep-emoji{font-size:22px;cursor:pointer;padding:4px;border-radius:6px;transition:background 0.1s;line-height:1;}
.ep-emoji:hover{background:#f0f0f0;}
.ep-sticker{font-size:40px;cursor:pointer;padding:4px;border-radius:8px;transition:background 0.1s;line-height:1;}
.ep-sticker:hover{background:#f0f0f0;}
</style>
</head>
<body>

<div id="login">
  <div class="login-icon">💬</div>
  <h2>เข้าสู่ห้องแชท</h2>
  <p>ตั้งชื่อและเลือกห้องที่ต้องการ</p>
  <div class="field-wrap">
    <div class="field-label">ชื่อของคุณ</div>
    <input id="name" type="text" placeholder="ชื่อของคุณ..." maxlength="20" autocomplete="off">
  </div>
  <div class="field-wrap">
    <div class="field-label">ห้องแชท (ไม่ระบุ = Default)</div>
    <input id="room" type="text" placeholder="เช่น งาน, เพื่อน, ทั่วไป..." maxlength="30" autocomplete="off">
    <div class="room-hint">พิมพ์ชื่อห้องที่มีอยู่เพื่อเข้าร่วม หรือพิมพ์ชื่อใหม่เพื่อสร้างห้อง</div>
  </div>
  <div id="name-error"></div>
  <button onclick="join()">เข้าร่วม</button>
</div>

<div id="chat">
  <div class="sidebar">
    <div class="sidebar-header">
      <h4>Online</h4>
      <span id="user-count">0 คน</span>
    </div>
    <div id="userlist"></div>
  </div>
  <div class="main">
    <div class="header">
      <div class="h-avatar">👥</div>
      <div class="h-info">
        <div class="h-title" id="room-title">ห้อง Default</div>
        <div class="h-sub"><span class="dot"></span> Online</div>
      </div>
    </div>
    <div id="msgs"></div>
    <div class="bar">
      <div id="emojipanel">
        <div class="ep-tabs">
          <button class="ep-tab active" onclick="switchTab('emoji')">😊 Emoji</button>
          <button class="ep-tab" onclick="switchTab('sticker')">🎭 Sticker</button>
        </div>
        <div class="ep-grid" id="ep-grid"></div>
      </div>
      <button id="emojibtn" onclick="toggleEmoji()">😊</button>
      <input id="msg" type="text" placeholder="พิมพ์ข้อความ..." autocomplete="off">
      <button id="sendbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
var socket, me, myId, curTab='emoji';

var EMOJIS = ['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩','😘','😚','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🫡','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','😮','😯','😲','😳','🥺','🥹','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','☠️','💩','🤡','👻','👽','👾','🤖','😺','😸','🎃','👍','👎','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','☝️','✋','🤚','🖐️','👋','🤝','🙌','👏','🫶','🙏','💪','🦾','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❤️‍🔥','💕','💞','💓','💗','💖','💘','💝','💟','🔥','💥','⭐','🌟','✨','🎉','🎊','🎈','🏆','🥇','🎯','🎮','🎲','🎭','🎨','🎬','🎤','🎧','🎵','🎶','🚀','✈️','🚗','🍕','🍔','🍟','🌮','🍣','🍜','🍰','🎂','🧁','🍫','🍬','🍭','🍺','🥂','🧋','💻','📱','💯'];
var STICKERS = ['😂','🥹','😍','🤩','😎','🥳','😭','😱','🤯','😤','🥺','😴','🤪','😇','🤬','👻','💩','🤡','👾','🎃','🫶','💪','👑','🦁','🐯','🦊','🐸','🐧','🦄','🐲'];

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.ep-tab').forEach(function(t,i){ t.classList.toggle('active',(i===0&&tab==='emoji')||(i===1&&tab==='sticker')); });
  renderGrid();
}
function renderGrid(){
  var grid=document.getElementById('ep-grid'); grid.innerHTML='';
  (curTab==='emoji'?EMOJIS:STICKERS).forEach(function(e){
    var s=document.createElement('span'); s.className=curTab==='emoji'?'ep-emoji':'ep-sticker'; s.textContent=e;
    s.onclick=function(){ curTab==='emoji'?insertEmoji(e):sendSticker(e); }; grid.appendChild(s);
  });
}
function toggleEmoji(){ var p=document.getElementById('emojipanel'); if(p.classList.contains('show')){p.classList.remove('show');return;} renderGrid(); p.classList.add('show'); }
function insertEmoji(e){ var inp=document.getElementById('msg'); inp.value+=e; inp.focus(); document.getElementById('emojipanel').classList.remove('show'); }
function sendSticker(e){ if(!socket) return; socket.emit('msg',{user:me,text:e,sticker:true}); document.getElementById('emojipanel').classList.remove('show'); }
document.addEventListener('click',function(e){ if(!e.target.closest('#emojibtn')&&!e.target.closest('#emojipanel')) document.getElementById('emojipanel').classList.remove('show'); });

var COLORS=['#e74c3c','#e67e22','#3498db','#9b59b6','#1abc9c','#e91e63','#ff5722','#607d8b'];
function nameColor(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length];}
function timeNow(){return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}

function join(){
  me = document.getElementById('name').value.trim();
  var room = document.getElementById('room').value.trim() || 'default';
  document.getElementById('name-error').textContent='';
  if(!me) return;
  if(socket) socket.disconnect();
  socket = io();
  socket.on('connect', function(){ myId=socket.id; socket.emit('join',{name:me, room:room}); });
  socket.on('nameTaken', function(){
    socket.disconnect(); socket=null;
    document.getElementById('name').style.borderColor='#e74c3c';
    document.getElementById('name-error').textContent='⚠️ ชื่อนี้มีคนใช้อยู่ในห้องนี้แล้ว';
    document.getElementById('name').focus();
  });
  socket.on('joined', function(data){
    var roomName = data.room === 'default' ? 'Default' : data.room;
    document.getElementById('room-title').textContent = 'ห้อง ' + roomName;
    document.getElementById('login').style.display='none';
    document.getElementById('chat').style.display='flex';
    document.getElementById('msg').focus();
  });
  socket.on('msg', function(d){ addMsg(d); });
  socket.on('users', function(list){ updateUsers(list); });
}

function updateUsers(list){
  var ul=document.getElementById('userlist'); ul.innerHTML='';
  document.getElementById('user-count').textContent=list.length+' คน';
  list.forEach(function(u){
    var div=document.createElement('div'); div.className='user-item';
    var isMe=u.id===myId;
    div.innerHTML='<div class="u-dot"></div><div class="u-name'+(isMe?' u-me':'')+'">'+u.name+(isMe?' (คุณ)':'')+'</div>';
    ul.appendChild(div);
  });
}

function addMsg(d){
  var msgs=document.getElementById('msgs');
  if(d.user==='System'){
    var s=document.createElement('div');s.className='sys';s.textContent=d.text;msgs.appendChild(s);
  } else {
    var isMe=d.sid===myId;
    var row=document.createElement('div');row.className='row'+(isMe?' me':'');
    var av=document.createElement('div');av.className='avatar';av.textContent=d.user[0].toUpperCase();
    if(!isMe) av.style.background=nameColor(d.user);
    var col=document.createElement('div');col.className='col';
    if(!isMe){var sn=document.createElement('div');sn.className='sender';sn.textContent=d.user;col.appendChild(sn);}
    var bub=document.createElement('div');bub.className='bubble '+(isMe?'me':'other')+(d.sticker?' sticker':'');bub.textContent=d.text;
    var tm=document.createElement('div');tm.className='time';tm.textContent=timeNow();
    col.appendChild(bub);col.appendChild(tm);
    if(isMe){row.appendChild(col);row.appendChild(av);}else{row.appendChild(av);row.appendChild(col);}
    msgs.appendChild(row);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function send(){
  var t=document.getElementById('msg').value.trim();
  if(!t||!socket) return;
  socket.emit('msg',{user:me,text:t});
  document.getElementById('msg').value='';
  document.getElementById('msg').focus();
}

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter') return;
  var chat=document.getElementById('chat');
  if(chat.style.display==='none'||chat.style.display==='') join(); else send();
});

// อ่าน ?room= จาก URL แล้วใส่ให้อัตโนมัติ
(function(){
  var params = new URLSearchParams(window.location.search);
  var r = params.get('room');
  if(r) document.getElementById('room').value = r;
})();
</script>
</body>
</html>
